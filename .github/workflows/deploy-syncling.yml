name: Deploy Syncling on Main

on:
  push:
    branches: [ main ]
    paths:
      - 'syncling/src/**'
      - 'core/src/**'
      - 'syncling/Dockerfile'
      - 'syncling/cloudbuild.yaml'
      - 'syncling/build.gradle.kts'
      - 'core/build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/deploy-syncling.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: '>= 468.0.0'

      - name: Build and push Docker image via Cloud Build
        run: |
          gcloud builds submit \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --config syncling/cloudbuild.yaml \
            --substitutions="_IMAGE=gcr.io/${{ secrets.GCP_PROJECT_ID }}/transloom-api" \
            .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy transloom-api \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --image "gcr.io/${{ secrets.GCP_PROJECT_ID }}/transloom-api" \
            --platform managed \
            --region asia-southeast1 \
            --allow-unauthenticated \
            --update-env-vars="ALLOWED_ORIGIN=https://syncling.space" \
            --update-secrets=APP_SECRETS=app-secrets:latest
