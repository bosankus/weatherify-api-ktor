name: Auto Deploy on Main

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: '>= 468.0.0'

      - name: Build and push Docker image via Cloud Build
        run: |
          gcloud builds submit \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --tag "gcr.io/${{ secrets.GCP_PROJECT_ID }}/weatherify-api"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy weatherify-api \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --image "gcr.io/${{ secrets.GCP_PROJECT_ID }}/weatherify-api" \
            --platform managed \
            --region asia-southeast1 \
            --allow-unauthenticated \
            --update-env-vars="FRONTEND_URL=https://data.androidplay.in/transloom/app,ALLOWED_ORIGIN=https://data.androidplay.in,APP_URL=https://data.androidplay.in" \
            --update-secrets=DB_CONNECTION_STRING=db-connection-string:latest \
            --update-secrets=MONGO_URI=mongo-uri:latest \
            --update-secrets=JWT_SECRET=jwt-secret:latest \
            --update-secrets=TOKEN_ENCRYPTION_KEY=token-encryption-key:latest \
            --update-secrets=WEATHER_API_KEY=weather-data-secret:latest \
            --update-secrets=RAZORPAY_KEY_ID=razorpay-key-id:latest \
            --update-secrets=RAZORPAY_SECRET=razorpay-secret:latest \
            --update-secrets=RAZORPAY_WEBHOOK_SECRET=razorpay-webhook-secret:latest \
            --update-secrets=RAZORPAY_PLAN_SOLO=razorpay-plan-solo:latest \
            --update-secrets=RAZORPAY_PLAN_TEAM=razorpay-plan-team:latest \
            --update-secrets=SENDGRID_API_KEY=sendgrid-api-key:latest \
            --update-secrets=REDIS_URL=redis-url:latest \
            --update-secrets=GITHUB_CLIENT_ID=github-client-id:latest \
            --update-secrets=GITHUB_CLIENT_SECRET=github-client-secret:latest \
            --update-secrets=GITHUB_WEBHOOK_SECRET=github-webhook-secret:latest \
            --update-secrets=GEMINI_API_KEY=gemini-api-key:latest \
            --update-secrets=CLOUDFLARE_ACCOUNT_ID=cloudflare-account-id:latest \
            --update-secrets=CLOUDFLARE_KV_NAMESPACE_ID=cloudflare-kv-namespace-id:latest \
            --update-secrets=CLOUDFLARE_API_TOKEN=cloudflare-api-token:latest \
            --update-secrets=FIREBASE_SERVICE_ACCOUNT_KEY=firebase-service-account-key:latest
